<style>
  .lb-overlay{position:fixed;inset:0;background:rgba(10,12,14,0.86);display:none;align-items:center;justify-content:center;z-index:9999;cursor:zoom-out;padding:24px}
  .lb-overlay.open{display:flex}
  .lb-overlay img{max-width:94vw;max-height:94vh;border-radius:4px;box-shadow:0 8px 40px rgba(0,0,0,0.5)}
  header a.button{top:8px;right:0;width:34px;height:34px;min-width:0;padding:0;border:0;font-size:0;line-height:0;background:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="%23ffffff"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>') no-repeat center / 30px 30px}
  header a.button small{display:none}
</style>
<script>
document.addEventListener('DOMContentLoaded', function () {
  var root = document.getElementById('main-content');
  if (!root) return;

  var tables = root.querySelectorAll('table');
  for (var i = 0; i < tables.length; i++) {
    var lbl = document.createElement('div');
    lbl.className = 'table-label';
    lbl.textContent = 'Table ' + (i + 1);
    tables[i].parentNode.insertBefore(lbl, tables[i]);
  }

  var ov = document.createElement('div');
  ov.className = 'lb-overlay';
  ov.setAttribute('aria-hidden', 'true');
  var big = document.createElement('img');
  ov.appendChild(big);
  document.body.appendChild(ov);

  function close() { ov.classList.remove('open'); ov.setAttribute('aria-hidden', 'true'); big.removeAttribute('src'); }
  ov.addEventListener('click', close);
  document.addEventListener('keydown', function (e) { if (e.key === 'Escape') close(); });

  var imgs = root.querySelectorAll('img');
  for (var j = 0; j < imgs.length; j++) {
    imgs[j].addEventListener('click', function () {
      big.src = this.currentSrc || this.src;
      big.alt = this.alt || '';
      ov.classList.add('open');
      ov.setAttribute('aria-hidden', 'false');
    });
  }
});
</script>
